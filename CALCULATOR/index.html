<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Voice Calculator</title>
    <link rel="stylesheet" href="style.css">
</head>

<body>

    <div class="calculator">
        <h2 class="calc-title">CALCULATOR APP</h2>
        <!-- VOICE STATUS -->
        <div id="voiceStatus" class="voice-status">
            <span class="mic"></span> Listening...
        </div>

        <div class="screen">
            <input type="text" id="display" value="0" readonly>
        </div>

        <button class="voice-btn" onclick="startVoice()">🎤 Voice Input</button>

        <div class="keys">
            <button class="fn" onclick="clearAll()">C</button>
            <button class="fn" onclick="deleteOne()">DEL</button>
            <button class="op" onclick="inputOperator('/')">÷</button>
            <button class="op" onclick="inputOperator('*')">×</button>

            <button onclick="inputNumber('7')">7</button>
            <button onclick="inputNumber('8')">8</button>
            <button onclick="inputNumber('9')">9</button>
            <button class="op" onclick="inputOperator('-')">−</button>

            <button onclick="inputNumber('4')">4</button>
            <button onclick="inputNumber('5')">5</button>
            <button onclick="inputNumber('6')">6</button>
            <button class="op" onclick="inputOperator('+')">+</button>

            <button onclick="inputNumber('1')">1</button>
            <button onclick="inputNumber('2')">2</button>
            <button onclick="inputNumber('3')">3</button>
            <button class="equal" onclick="calculate()">=</button>

            <button class="zero" onclick="inputNumber('0')">0</button>
            <button onclick="inputDecimal()">.</button>
        </div>
    </div>

    <script src="script.js"></script>
</body>

</html>
